name: Manage license and model

on:
  workflow_dispatch:
    inputs:
      action:
        description: Operation
        required: true
        type: choice
        options:
          - add
          - revoke
          - activate
          - model
          - resign
      license_hash:
        description: SHA-256 from the License Tool (needed for add/revoke/activate)
        required: false
        type: string
      device_hash:
        description: Customer device code (optional; recommended)
        required: false
        type: string
      expires_at:
        description: Expiry as YYYY-MM-DD (blank means no expiry)
        required: false
        type: string
      label:
        description: Customer label
        required: false
        type: string
      model:
        description: OpenRouter model, for example z-ai/glm-5.2
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: alphaxdraco-control
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install signer
        run: python -m pip install --disable-pip-version-check cryptography==45.0.4

      - name: Update signed manifest
        env:
          LICENSE_SIGNING_KEY_PEM: ${{ secrets.LICENSE_SIGNING_KEY_PEM }}
          ACTION_NAME: ${{ inputs.action }}
          LICENSE_HASH: ${{ inputs.license_hash }}
          DEVICE_HASH: ${{ inputs.device_hash }}
          EXPIRES_AT: ${{ inputs.expires_at }}
          CUSTOMER_LABEL: ${{ inputs.label }}
          MODEL_NAME: ${{ inputs.model }}
        run: |
          python scripts/manage_control.py "$ACTION_NAME" \
            --license-hash "$LICENSE_HASH" \
            --device-hash "$DEVICE_HASH" \
            --expires-at "$EXPIRES_AT" \
            --label "$CUSTOMER_LABEL" \
            --model "$MODEL_NAME"

      - name: Commit control update
        run: |
          git config user.name "AlphaXDraco Control Bot"
          git config user.email "actions@users.noreply.github.com"
          git add control.json manifest.json
          git diff --cached --quiet && exit 0
          git commit -m "control: ${{ inputs.action }}"
          git push
